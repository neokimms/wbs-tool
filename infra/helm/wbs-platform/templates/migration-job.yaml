{{- if .Values.api.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wbs-platform.fullname" . }}-migration
  labels:
    {{- include "wbs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
spec:
  backoffLimit: {{ .Values.api.migrationJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "wbs-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command: ["python", "-m", "app.migrate"]
          env:
            - name: POSTGRES_HOST
              value: {{ include "wbs-platform.databaseHost" . | quote }}
            - name: POSTGRES_PORT
              value: {{ include "wbs-platform.databasePort" . | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wbs-platform.databaseSecretName" . }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wbs-platform.databaseSecretName" . }}
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "wbs-platform.databaseSecretName" . }}
                  key: database
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
{{- end }}
