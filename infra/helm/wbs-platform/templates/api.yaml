apiVersion: v1
kind: Service
metadata:
  name: {{ include "wbs-platform.apiServiceName" . }}
  labels:
    {{- include "wbs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    {{- include "wbs-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wbs-platform.fullname" . }}-api
  labels:
    {{- include "wbs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "wbs-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "wbs-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- if .Values.monitoring.prometheusAnnotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: {{ include "wbs-platform.databaseHost" . | quote }}
            - name: POSTGRES_PORT
              value: {{ include "wbs-platform.databasePort" . | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wbs-platform.databaseSecretName" . }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wbs-platform.databaseSecretName" . }}
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "wbs-platform.databaseSecretName" . }}
                  key: database
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: OPENPROJECT_BASE_URL
              value: {{ .Values.api.openprojectBaseUrl | quote }}
            - name: OPENPROJECT_HOST_HEADER
              value: {{ .Values.api.openprojectHostHeader | quote }}
            - name: OPENPROJECT_SYNC_ENABLED
              value: {{ .Values.api.openprojectSyncEnabled | quote }}
            - name: OPENPROJECT_API_TOKEN
              value: {{ .Values.api.openprojectApiToken | quote }}
            - name: OPENPROJECT_AUTH_MODE
              value: {{ .Values.api.openprojectAuthMode | quote }}
            - name: OPENPROJECT_DEFAULT_TYPE_ID
              value: {{ .Values.api.openprojectDefaultTypeId | quote }}
            - name: OPENPROJECT_TYPE_MAP_JSON
              value: {{ .Values.api.openprojectTypeMapJson | quote }}
            - name: OPENPROJECT_SYNC_PARENT_LINKS
              value: {{ .Values.api.openprojectSyncParentLinks | quote }}
            - name: PM_ENGINE_ADAPTER
              value: {{ .Values.api.pmEngineAdapter | quote }}
            - name: PORTAL_ORIGIN
              value: {{ .Values.api.portalOrigin | quote }}
            - name: WBS_ALLOW_FILE_ORIGIN
              value: {{ .Values.api.allowFileOrigin | quote }}
            - name: WBS_LOGIN_FAILURE_LIMIT
              value: {{ .Values.api.loginFailureLimit | quote }}
            - name: WBS_LOGIN_LOCK_MINUTES
              value: {{ .Values.api.loginLockMinutes | quote }}
            - name: WBS_AUDIT_RETENTION_DAYS
              value: {{ .Values.api.auditRetentionDays | quote }}
            - name: WBS_RUN_MIGRATIONS_ON_STARTUP
              value: {{ .Values.api.runMigrationsOnStartup | quote }}
            - name: BACKUP_DIR
              value: {{ .Values.api.backupDir | quote }}
          {{- if .Values.api.backupVolume.enabled }}
          volumeMounts:
            - name: backup-dir
              mountPath: {{ .Values.api.backupDir | quote }}
              readOnly: {{ .Values.api.backupVolume.readOnly }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- if .Values.api.backupVolume.enabled }}
      volumes:
        - name: backup-dir
          persistentVolumeClaim:
            claimName: {{ required "api.backupVolume.existingClaim is required when api.backupVolume.enabled=true" .Values.api.backupVolume.existingClaim | quote }}
      {{- end }}
