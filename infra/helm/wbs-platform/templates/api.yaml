apiVersion: v1
kind: Service
metadata:
  name: {{ include "wbs-platform.apiServiceName" . }}
  labels:
    {{- include "wbs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    {{- include "wbs-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wbs-platform.fullname" . }}-api
  labels:
    {{- include "wbs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.hpa.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "wbs-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "wbs-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- if .Values.monitoring.prometheusAnnotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: {{ include "wbs-platform.databaseHost" . | quote }}
            - name: POSTGRES_PORT
              value: {{ include "wbs-platform.databasePort" . | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wbs-platform.databaseSecretName" . }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wbs-platform.databaseSecretName" . }}
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "wbs-platform.databaseSecretName" . }}
                  key: database
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: OPENPROJECT_BASE_URL
              value: {{ .Values.api.openprojectBaseUrl | quote }}
            - name: OPENPROJECT_HOST_HEADER
              value: {{ .Values.api.openprojectHostHeader | quote }}
            - name: OPENPROJECT_SYNC_ENABLED
              value: {{ .Values.api.openprojectSyncEnabled | quote }}
            - name: OPENPROJECT_API_TOKEN
              value: {{ .Values.api.openprojectApiToken | quote }}
            - name: OPENPROJECT_AUTH_MODE
              value: {{ .Values.api.openprojectAuthMode | quote }}
            - name: OPENPROJECT_DEFAULT_TYPE_ID
              value: {{ .Values.api.openprojectDefaultTypeId | quote }}
            - name: OPENPROJECT_TYPE_MAP_JSON
              value: {{ .Values.api.openprojectTypeMapJson | quote }}
            - name: OPENPROJECT_SYNC_PARENT_LINKS
              value: {{ .Values.api.openprojectSyncParentLinks | quote }}
            - name: PM_ENGINE_ADAPTER
              value: {{ .Values.api.pmEngineAdapter | quote }}
            - name: PORTAL_ORIGIN
              value: {{ .Values.api.portalOrigin | quote }}
            - name: WBS_ALLOW_FILE_ORIGIN
              value: {{ .Values.api.allowFileOrigin | quote }}
            - name: WBS_LOGIN_FAILURE_LIMIT
              value: {{ .Values.api.loginFailureLimit | quote }}
            - name: WBS_LOGIN_LOCK_MINUTES
              value: {{ .Values.api.loginLockMinutes | quote }}
            - name: WBS_ENABLE_LOGIN_ALIASES
              value: {{ .Values.api.enableLoginAliases | quote }}
            - name: WBS_LOGIN_ALIASES_JSON
              value: {{ .Values.api.loginAliasesJson | quote }}
            - name: WBS_AUDIT_RETENTION_DAYS
              value: {{ .Values.api.auditRetentionDays | quote }}
            - name: WBS_RUN_MIGRATIONS_ON_STARTUP
              value: {{ .Values.api.runMigrationsOnStartup | quote }}
            - name: WBS_REPORT_SCHEDULER_ENABLED
              value: {{ .Values.api.reportSchedulerEnabled | quote }}
            - name: WBS_REPORT_TIMEZONE
              value: {{ .Values.api.reportTimezone | quote }}
            - name: WBS_REPORT_OUTPUT_DIR
              value: {{ .Values.api.reportOutputDir | quote }}
            - name: WBS_SMTP_HOST
              value: {{ .Values.api.reportSmtpHost | quote }}
            - name: WBS_SMTP_PORT
              value: {{ .Values.api.reportSmtpPort | quote }}
            - name: WBS_SMTP_USERNAME
              value: {{ .Values.api.reportSmtpUsername | quote }}
            - name: WBS_SMTP_PASSWORD
              value: {{ .Values.api.reportSmtpPassword | quote }}
            - name: WBS_SMTP_FROM
              value: {{ .Values.api.reportSmtpFrom | quote }}
            - name: WBS_SMTP_USE_TLS
              value: {{ .Values.api.reportSmtpUseTls | quote }}
            - name: WBS_SMTP_USE_SSL
              value: {{ .Values.api.reportSmtpUseSsl | quote }}
            - name: AUTH_BACKEND
              value: {{ .Values.api.authBackend | quote }}
            - name: LDAP_SERVER
              value: {{ .Values.api.ldapServer | quote }}
            - name: LDAP_PORT
              value: {{ .Values.api.ldapPort | quote }}
            - name: LDAP_USE_SSL
              value: {{ .Values.api.ldapUseSSL | quote }}
            - name: LDAP_BIND_DN
              value: {{ .Values.api.ldapBindDN | quote }}
            - name: LDAP_BIND_PASSWORD
              value: {{ .Values.api.ldapBindPassword | quote }}
            - name: LDAP_BASE_DN
              value: {{ .Values.api.ldapBaseDN | quote }}
            - name: LDAP_USER_FILTER
              value: {{ .Values.api.ldapUserFilter | quote }}
            - name: LDAP_ATTR_EMAIL
              value: {{ .Values.api.ldapAttrEmail | quote }}
            - name: LDAP_ATTR_NAME
              value: {{ .Values.api.ldapAttrName | quote }}
            - name: MULTITENANCY_ENABLED
              value: {{ .Values.api.multitenancyEnabled | quote }}
            - name: DEFAULT_TENANT_ID
              value: {{ .Values.api.defaultTenantId | quote }}
            - name: SMTP_HOST
              value: {{ .Values.api.smtpHost | quote }}
            - name: SMTP_PORT
              value: {{ .Values.api.smtpPort | quote }}
            - name: SMTP_USER
              value: {{ .Values.api.smtpUser | quote }}
            - name: SMTP_PASSWORD
              value: {{ .Values.api.smtpPassword | quote }}
            - name: NOTIFY_FROM_EMAIL
              value: {{ .Values.api.notifyFromEmail | quote }}
            - name: BACKUP_DIR
              value: {{ .Values.api.backupDir | quote }}
          volumeMounts:
            - name: report-output-dir
              mountPath: {{ .Values.api.reportOutputDir | quote }}
          {{- if .Values.api.backupVolume.enabled }}
            - name: backup-dir
              mountPath: {{ .Values.api.backupDir | quote }}
              readOnly: {{ .Values.api.backupVolume.readOnly }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
      {{- if .Values.api.reportOutputVolume.enabled }}
        - name: report-output-dir
          persistentVolumeClaim:
            claimName: {{ required "api.reportOutputVolume.existingClaim is required when api.reportOutputVolume.enabled=true" .Values.api.reportOutputVolume.existingClaim | quote }}
      {{- else }}
        - name: report-output-dir
          emptyDir: {}
      {{- end }}
      {{- if .Values.api.backupVolume.enabled }}
        - name: backup-dir
          persistentVolumeClaim:
            claimName: {{ required "api.backupVolume.existingClaim is required when api.backupVolume.enabled=true" .Values.api.backupVolume.existingClaim | quote }}
      {{- end }}
