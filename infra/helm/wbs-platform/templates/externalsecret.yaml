{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "wbs-platform.fullname" . }}-secrets
  labels:
    {{- include "wbs-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind | default "SecretStore" }}
  target:
    name: {{ include "wbs-platform.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ printf "%s%sdatabase-url" .Values.externalSecret.remoteKeyPrefix (.Values.externalSecret.keySeparator | default "/") }}
    - secretKey: OPENPROJECT_API_TOKEN
      remoteRef:
        key: {{ printf "%s%sopenproject-api-token" .Values.externalSecret.remoteKeyPrefix (.Values.externalSecret.keySeparator | default "/") }}
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: {{ printf "%s%ssmtp-password" .Values.externalSecret.remoteKeyPrefix (.Values.externalSecret.keySeparator | default "/") }}
    {{- if .Values.externalSecret.extraKeys }}
    {{- range .Values.externalSecret.extraKeys }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
    {{- end }}
    {{- end }}
{{- end }}
