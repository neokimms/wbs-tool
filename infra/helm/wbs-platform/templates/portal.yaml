apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wbs-platform.fullname" . }}-portal-config
  labels:
    {{- include "wbs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
data:
  config.js: |
    window.WBS_API_BASE_URL = {{ .Values.portal.apiBaseUrl | quote }};
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wbs-platform.portalServiceName" . }}
  labels:
    {{- include "wbs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
spec:
  type: {{ .Values.portal.service.type }}
  ports:
    - name: http
      port: {{ .Values.portal.service.port }}
      targetPort: http
  selector:
    {{- include "wbs-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wbs-platform.fullname" . }}-portal
  labels:
    {{- include "wbs-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
spec:
  replicas: {{ .Values.portal.replicaCount }}
  selector:
    matchLabels:
      {{- include "wbs-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: portal
  template:
    metadata:
      labels:
        {{- include "wbs-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: portal
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: portal
          image: "{{ .Values.portal.image.repository }}:{{ .Values.portal.image.tag }}"
          imagePullPolicy: {{ .Values.portal.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
          volumeMounts:
            - name: portal-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
      volumes:
        - name: portal-config
          configMap:
            name: {{ include "wbs-platform.fullname" . }}-portal-config
