nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

api:
  replicaCount: 2
  image:
    repository: ghcr.io/neokimms/wbs-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  openprojectBaseUrl: "http://openproject"
  openprojectHostHeader: ""
  openprojectSyncEnabled: false
  openprojectApiToken: ""
  openprojectAuthMode: bearer
  openprojectDefaultTypeId: ""
  openprojectTypeMapJson: "{}"
  openprojectSyncParentLinks: true
  pmEngineAdapter: openproject
  portalOrigin: "https://wbs.example.com"
  allowFileOrigin: false
  loginFailureLimit: 5
  loginLockMinutes: 15
  enableLoginAliases: false
  loginAliasesJson: ""
  auditRetentionDays: 365
  runMigrationsOnStartup: true
  reportSchedulerEnabled: true
  reportTimezone: "Asia/Seoul"
  reportOutputDir: "/app/outputs/reports"
  reportOutputVolume:
    enabled: false
    existingClaim: ""
  reportSmtpHost: ""
  reportSmtpPort: 587
  reportSmtpUsername: ""
  reportSmtpPassword: ""
  reportSmtpFrom: ""
  reportSmtpUseTls: true
  reportSmtpUseSsl: false
  migrationJob:
    enabled: false
    backoffLimit: 3
  backupDir: "/app/backups/postgres"
  backupVolume:
    enabled: false
    existingClaim: ""
    readOnly: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  # P2-06: SSO/LDAP
  authBackend: local      # local | ldap
  ldapServer: ""
  ldapPort: 389
  ldapUseSSL: false
  ldapBindDN: ""
  ldapBindPassword: ""
  ldapBaseDN: ""
  ldapUserFilter: "(mail={email})"
  ldapAttrEmail: mail
  ldapAttrName: cn
  # P2-05: 멀티 테넌시
  multitenancyEnabled: true
  defaultTenantId: default
  # 알림 SMTP
  smtpHost: ""
  smtpPort: 587
  smtpUser: ""
  smtpPassword: ""
  notifyFromEmail: ""

portal:
  replicaCount: 2
  image:
    repository: ghcr.io/neokimms/wbs-portal
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  apiBaseUrl: "https://wbs-api.example.com"
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

networkPolicy:
  enabled: false
  allowIngressFromNamespaces: false
  ingressNamespace: ingress-nginx
  allowSMTP: true

externalSecret:
  enabled: false
  secretStoreName: aws-secretsmanager
  secretStoreKind: ClusterSecretStore
  refreshInterval: 1h
  remoteKeyPrefix: wbs-platform
  # remoteKeyPrefix와 키 이름 사이의 구분자.
  # AWS Secrets Manager / Vault는 경로 구분자 "/"를 지원하지만,
  # Azure Key Vault 시크릿 이름은 "/"를 허용하지 않으므로 "-"로 재정의해야 함.
  keySeparator: "/"
  extraKeys: []

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17"
    pullPolicy: IfNotPresent
  auth:
    database: wbs_platform
    username: wbs
    password: "change-me"
    existingSecret: ""
  service:
    port: 5432
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

externalPostgresql:
  host: ""
  port: 5432
  database: wbs_platform
  username: wbs
  password: "change-me"
  existingSecret: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: wbs.example.com
      paths:
        - path: /
          pathType: Prefix
          service: portal
    - host: wbs-api.example.com
      paths:
        - path: /
          pathType: Prefix
          service: api
  tls: []

monitoring:
  prometheusAnnotations: true
