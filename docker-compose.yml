services:
  postgres:
    image: postgres:17
    profiles: ["api", "openproject"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wbs_platform}
      POSTGRES_USER: ${POSTGRES_USER:-wbs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wbs_dev_password}
    volumes:
      - postgres17_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wbs} -d ${POSTGRES_DB:-wbs_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  memcached:
    image: memcached:1.6-alpine
    profiles: ["openproject"]
    command: ["memcached", "-m", "128"]

  openproject:
    image: openproject/openproject:17
    profiles: ["openproject"]
    depends_on:
      postgres:
        condition: service_healthy
      memcached:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wbs}:${POSTGRES_PASSWORD:-wbs_dev_password}@postgres:5432/openproject
      OPENPROJECT_SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE:-change-me-development-secret-key-base-please-replace-before-production-2026-06-01-wbs-platform-openproject}
      SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE:-change-me-development-secret-key-base-please-replace-before-production-2026-06-01-wbs-platform-openproject}
      OPENPROJECT_HOST__NAME: ${OPENPROJECT_HOST_NAME:-localhost:8080}
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_DEFAULT__LANGUAGE: ko
      OPENPROJECT_SEED__ADMIN__USER__PASSWORD: ${OPENPROJECT_ADMIN_PASSWORD:-adminadmin}
      RAILS_CACHE_STORE: memcache
      OPENPROJECT_CACHE__MEMCACHE__SERVER: memcached:11211
    volumes:
      - openproject_assets:/var/openproject/assets
      - ./infra/openproject/scripts:/opt/wbs/openproject:ro
    ports:
      - "8080:80"

  wbs-api:
    build:
      context: ./services/wbs-api
    profiles: ["api"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wbs}:${POSTGRES_PASSWORD:-wbs_dev_password}@postgres:5432/${POSTGRES_DB:-wbs_platform}
      OPENPROJECT_BASE_URL: http://openproject
      OPENPROJECT_HOST_HEADER: ${OPENPROJECT_HOST_HEADER:-localhost:8080}
      OPENPROJECT_SYNC_ENABLED: ${OPENPROJECT_SYNC_ENABLED:-false}
      OPENPROJECT_API_TOKEN: ${OPENPROJECT_API_TOKEN:-}
      OPENPROJECT_AUTH_MODE: ${OPENPROJECT_AUTH_MODE:-bearer}
      OPENPROJECT_DEFAULT_TYPE_ID: ${OPENPROJECT_DEFAULT_TYPE_ID:-}
      OPENPROJECT_TYPE_MAP_JSON: ${OPENPROJECT_TYPE_MAP_JSON:-{}}
      OPENPROJECT_SYNC_PARENT_LINKS: ${OPENPROJECT_SYNC_PARENT_LINKS:-true}
      PM_ENGINE_ADAPTER: ${PM_ENGINE_ADAPTER:-openproject}
      PORTAL_ORIGIN: http://localhost:${WBS_PORTAL_PORT:-3010}
      WBS_ALLOW_FILE_ORIGIN: ${WBS_ALLOW_FILE_ORIGIN:-true}
      WBS_LOGIN_FAILURE_LIMIT: ${WBS_LOGIN_FAILURE_LIMIT:-5}
      WBS_LOGIN_LOCK_MINUTES: ${WBS_LOGIN_LOCK_MINUTES:-15}
      WBS_AUDIT_RETENTION_DAYS: ${WBS_AUDIT_RETENTION_DAYS:-365}
      WBS_RUN_MIGRATIONS_ON_STARTUP: ${WBS_RUN_MIGRATIONS_ON_STARTUP:-true}
      BACKUP_DIR: /app/backups/postgres
    volumes:
      - ./backups/postgres:/app/backups/postgres:ro
    ports:
      - "${WBS_API_PORT:-8000}:8000"

  wbs-portal:
    build:
      context: ./apps/portal
    ports:
      - "${WBS_PORTAL_PORT:-3010}:80"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    profiles: ["monitoring"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-wbs}:${POSTGRES_PASSWORD:-wbs_dev_password}@postgres:5432/${POSTGRES_DB:-wbs_platform}?sslmode=disable
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["monitoring"]
    depends_on:
      wbs-api:
        condition: service_started
      postgres-exporter:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

volumes:
  postgres17_data:
  openproject_assets:
  prometheus_data:
